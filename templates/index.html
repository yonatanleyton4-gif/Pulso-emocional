<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Emociones - Institución Educativa [Nombre de tu Colegio]</title>
    <meta name="description" content="Plataforma interactiva para el registro de emociones de alumnos de la Institución Nuestra señora de fatima. Proyecto desarrollado por Yonatan.">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Hola, {{ username }}!</h1>
            <p>¿Como va tu dia?</p>
        </header>
    </div>

    <form  action="/registrar" method="POST">
        <div class="card-grid">
            <label class="card-option">
                <input type="radio" name="emocion" value="Feliz" required>
                <div class="card-content">
                    <span class="emoji">😊</span>
                    <span>Feliz</span>
                </div>
            </label>
            <label class="card-option">
                <input type="radio" name="emocion" value="Triste">
                <div class="card-content">
                    <span class="emoji">😢</span>
                    <span>Triste</span>
                </div>
            </label>
            <label class="card-option">
                <input type="radio" name="emocion" value="Enojo">
                <div class="card-content">
                    <span class="emoji">😠</span>
                    <span>Con enojo</span>
                </div>
            </label>
            <label class="card-option">
                <input type="radio" name="emocion" value="Estres">
                <div class="card-content">
                    <span class="emoji">🤯</span>
                    <span>Con estres</span>
                </div>
            </label>
            <label class="card-option">
                <input type="radio" name="emocion" value="Miedo">
                <div class="card-content">
                    <span class="emoji">😨</span>
                    <span>Con miedo</span>
                </div>
            </label>
            <label class="card-option">
                <input type="radio" name="emocion" value="Asco">
                <div class="card-content">
                    <span class="emoji">🤢</span>
                    <span>Con asco</span>
                </div>
            </label>
            <label class="card-option">
                <input type="radio" name="emocion" value="Sorpresa">
                <div class="card-content">
                    <span class="emoji">🤯</span>
                    <span>Con sorpresa</span>
                </div>
            </label>
            <label class="card-option">
                <input type="radio" name="emocion" value="Neutral">
                <div class="card-content">
                    <span class="emoji">😐</span>
                    <span>Neutral</span>
                </div>
            </label>
        </div>
        <button type="submit" class="btn-primary">Guardar Momento</button>
    </form>

    <nav class="mobile-nav">
        <div><a href="{{ url_for('stats') }}">Estadísticas</a></div>
        <div><a href="/logout" class="logout-link">Cerrar Sesión</a></div>
    </nav>
</body>
</html>
